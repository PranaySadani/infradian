# Run the whole stack locally with the full backend, not the serverless subset.
#
#   cp .env.example .env      # add your OPENAI_API_KEY to light up the multimodal paths
#   docker compose up --build
#   open http://localhost:3000
#
# The frontend talks to the backend over NEXT_PUBLIC_API_URL, which is baked in at build time
# because the Next.js app is a static export.

services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: infradian-api:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Optional overrides; the defaults in openai_client.py are used when unset.
      INFRADIAN_CHAT_MODEL: ${INFRADIAN_CHAT_MODEL:-gpt-4o-mini}
      INFRADIAN_VISION_MODEL: ${INFRADIAN_VISION_MODEL:-gpt-4o-mini}
      INFRADIAN_TRANSCRIBE_MODEL: ${INFRADIAN_TRANSCRIBE_MODEL:-whisper-1}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    image: infradian-web:latest
    ports:
      - "3000:3000"
    depends_on:
      - api
