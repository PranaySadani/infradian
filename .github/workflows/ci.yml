name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync
        run: uv sync --extra api --extra dev
      - name: Lint
        run: uv run ruff check src scripts tests
      - name: Privacy guard — no raw data may be committed
        run: |
          if git ls-files | grep -E '^data/(raw|interim|processed)/'; then
            echo "raw data committed — failing"; exit 1; fi
      - name: Tests (leakage, causality, parity, privacy, api, llm)
        run: uv run python -m pytest -q
      - name: Smoke eval (synthetic tier, reproducible with no data access)
        run: |
          uv run python -m infradian.synth.generator --n 60 --days 90 --seed 7 --out data/tier_c
          uv run python scripts/run_bench.py --tier C
          uv run python -m infradian.llm.eval
